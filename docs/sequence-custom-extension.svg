<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 24px Arial,sans-serif;fill:#111827}
      .head{fill:#e8f1fb;stroke:#8fb0d3;stroke-width:1.5}
      .headText{font:700 15px Arial,sans-serif;fill:#172033}
      .line{stroke:#94a3b8;stroke-width:1.4;stroke-dasharray:5 5}
      .arrow{stroke:#334155;stroke-width:1.7;marker-end:url(#arrow)}
      .selfArrow{stroke:#94a3b8;stroke-width:1.2;fill:none;marker-end:url(#arrow)}
      .msg{font:13px Arial,sans-serif;fill:#1f2937}
      .box{fill:#fff7ed;stroke:#fdba74;stroke-width:1.5}
      .alt{font:700 13px Arial,sans-serif;fill:#9a3412}
    </style>
  </defs>
  <rect width="980" height="520" fill="#ffffff"/>
  <text x="40" y="42" class="title">커스텀 확장자 추가</text>

  <g transform="translate(40 75)">
    <rect class="head" width="130" height="44" rx="8"/>
    <text class="headText" x="65" y="27" text-anchor="middle">사용자</text>
  </g>
  <g transform="translate(230 75)">
    <rect class="head" width="130" height="44" rx="8"/>
    <text class="headText" x="65" y="27" text-anchor="middle">화면</text>
  </g>
  <g transform="translate(420 75)">
    <rect class="head" width="150" height="44" rx="8"/>
    <text class="headText" x="75" y="27" text-anchor="middle">Controller</text>
  </g>
  <g transform="translate(625 75)">
    <rect class="head" width="130" height="44" rx="8"/>
    <text class="headText" x="65" y="27" text-anchor="middle">Service</text>
  </g>
  <g transform="translate(820 75)">
    <rect class="head" width="110" height="44" rx="8"/>
    <text class="headText" x="55" y="27" text-anchor="middle">DB</text>
  </g>

  <line class="line" x1="105" y1="119" x2="105" y2="480"/>
  <line class="line" x1="295" y1="119" x2="295" y2="480"/>
  <line class="line" x1="495" y1="119" x2="495" y2="480"/>
  <line class="line" x1="690" y1="119" x2="690" y2="480"/>
  <line class="line" x1="875" y1="119" x2="875" y2="480"/>

  <line class="arrow" x1="105" y1="155" x2="295" y2="155"/>
  <text class="msg" x="123" y="146">확장자 입력 후 추가 클릭</text>

  <path class="selfArrow" d="M295 190 C345 190 345 220 295 220"/>
  <text class="msg" x="315" y="185">프론트 입력 검증</text>

  <line class="arrow" x1="295" y1="255" x2="495" y2="255"/>
  <text class="msg" x="317" y="246">POST /api/v1/extensions/custom</text>

  <line class="arrow" x1="495" y1="295" x2="690" y2="295"/>
  <text class="msg" x="520" y="286">createCustomExtension</text>

  <path class="selfArrow" d="M690 330 C740 330 740 360 690 360"/>
  <text class="msg" x="710" y="326">정규화 및 유효성 검증</text>

  <line class="arrow" x1="690" y1="395" x2="875" y2="395"/>
  <text class="msg" x="720" y="386">중복 조회 / 저장</text>

  <line class="arrow" x1="875" y1="430" x2="295" y2="430"/>
  <text class="msg" x="515" y="421">성공 응답 또는 오류 응답</text>

  <rect class="box" x="250" y="455" width="480" height="42" rx="8"/>
  <text class="alt" x="490" y="480" text-anchor="middle">저장 가능: 목록 표시 / 저장 불가: 오류 메시지 표시</text>
</svg>
